name            = "radiografia-worker"
main            = "index.js"
compatibility_date = "2024-09-23"

# Variables no-sensibles
[vars]
# Precios LIVE (producción)
PRICE_DESCUBRE = "price_1TAx9DGpKMTmfzJmpkCihX2H"
PRICE_SOLO     = "price_1TAx9DGpKMTmfzJmA3AaPICo"
PRICE_LOSDOS   = "price_1TAx9EGpKMTmfzJmo8Z6WY4q"
# Precios TEST (modo prueba)
PRICE_DESCUBRE_TEST = "price_1TAyi3GpKMTmfzJmE7YV8eql"
PRICE_SOLO_TEST     = "price_1TAyi3GpKMTmfzJm9f5lKQF7"
PRICE_LOSDOS_TEST   = "price_1TAyi4GpKMTmfzJmHW6aJejf"

# Secrets (wrangler secret put):
#   STRIPE_SECRET_KEY        — live sk_live_xxx
#   STRIPE_TEST_SECRET_KEY   — test sk_test_xxx
#   STRIPE_WEBHOOK_SECRET    — whsec_xxx (live webhook)
#   RESEND_API_KEY
#   DEEPSEEK_API_KEY         — sk-xxx (DeepSeek chat API)
#   ELEVENLABS_API_KEY       — sk_xxx (ElevenLabs TTS API)
#   PROMO_CODES_JSON  (opcional — JSON con códigos extra)

# KV Namespace — deploy.ps1 rellena los ids
[[kv_namespaces]]
binding    = "PURCHASES"
id         = "9f5ee5a5f0fc49ecaecf7e06763afd80"
preview_id = "9f5ee5a5f0fc49ecaecf7e06763afd80"

[[r2_buckets]]
binding     = "AUDIO_BUCKET"
bucket_name = "luisvirrueta-audio"
